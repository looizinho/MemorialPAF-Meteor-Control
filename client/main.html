<head>
  <title>PAF Control</title>
</head>

<body>
  {{> content}}
</body>

<template name="content">
  <div class="content">
    {{> header}}
    {{> blocks}}
  </div>
</template>

<template name="header">
  <div class="header">
    <h1>Memorial PAF - Controle</h1>
  </div>
</template>

<template name="blocks">
  <div class="blocks">
    {{> oPedro}}
    {{> linhaDoTempo}}
    {{> multipliqueSe}}
  </div>
</template>

<template name="oPedro">
  <div class="block">
    <div class="block-title">
      O Pedro
    </div>
    <div class="block-buttons">
      <button class="block-button btn-portugues" id="pedroPt">{{txtPt}}</button>
      <button class="block-button btn-ingles" id="pedroEn">{{txtEn}}</button>
    </div>
  </div>
</template>

<template name="linhaDoTempo">
  <div class="block">
    <div class="block-title">
      Linha do Tempo
    </div>
    <div class="block-buttons">
      <button class="block-button btn-portugues" id="linhaPt">{{txtPt}}</button>
      <button class="block-button btn-ingles" id="linhaEn">{{txtEn}}</button>
    </div>
  </div>
</template>

<template name="multipliqueSe">
  <div class="block">
    <div class="block-title">
      Multiplique-se
    </div>
    <div class="block-buttons">
      <button class="block-button btn-portugues" id="multiPt">{{txtPt}}</button>
      <button class="block-button btn-ingles" id="multiEn">{{txtEn}}</button>
    </div>
  </div>
</template>
